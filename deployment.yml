apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: myapp
    tier: front-end
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1   # 1 pod can go down during the update
      maxSurge: 1         # 1 extra pod can be created during the update
  replicas: 2                
  selector:
    matchLabels:
      app: myapp
      tier: front-end
  template:
    metadata:
      labels:
        app: myapp
        tier: front-end
    spec:
      containers:
      - name: nginx-controller
        image: nginx
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "250m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                    - linux
                    