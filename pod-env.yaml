apiVersion: v1
kind: Pod
metadata:
  name: pod-with-env
  labels:
    app: myapp
spec:
  containers:
  - name: nginx-container
    image: nginx:latest
    ports:
    - containerPort: 80
    env:
    - name: ENVIRONMENT
      value: "production"
    - name: LOG_LEVEL
      value: "info"
    - name: DB_HOST
      valueFrom:
        configmapKeyRef:
          name: db-config
          key: DB_HOST
    - name: DB_PORT
      valueFrom:
        configMapKeyRef:
          name: db-config
          key: DB_PORT
    - name: DB_Password
      valueFrom:
        secretKeyRef:
          name: db-secret
          key: DB_PASSWORD
    resources:
      requests:
        memory: "64Mi"
        cpu: "250m"
      limits:
        memory: "128Mi"
        cpu: "500m"